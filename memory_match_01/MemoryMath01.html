<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match with Images</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    #game {
      display: none;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(4, 1fr);
      width: 100vw;
      height: 100vh;
      gap: 5px;
      position: relative;
      z-index: 1;
    }

    .card {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s;
      cursor: pointer;
    }

    .card .back, .card .front {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
    }

    .back {
      background: #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      color: #000;
    }

    .front {
      transform: rotateY(180deg);
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      font-family: Arial, sans-serif;
      z-index: 2;
    }

    #overlay button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background: #fff;
      border: none;
      border-radius: 5px;
      color: #000;
    }

    #overlay button:hover {
      background: #ddd;
    }

    button#noBtn {
      background: #ff0000 !important;
      color: #000 !important;
    }

    button#noBtn:hover {
      background: #cc0000 !important;
    }

    button#yesBtn {
      background: #00ff00 !important;
      color: #000 !important;
    }

    button#yesBtn:hover {
      background: #00cc00 !important;
    }

    .dust {
      position: absolute;
      background: rgba(255, 255, 255, 1);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .transition-dust {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
    }

    #caption {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      font-size: 60px;
      font-family: Arial, sans-serif;
      border-radius: 10px;
      z-index: 3;
      display: none;
      text-align: center;
    }

    #winPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: #00ff00;
      padding: 20px;
      font-size: 80px;
      font-family: Arial, sans-serif;
      border-radius: 10px;
      z-index: 4;
      display: none;
      text-align: center;
    }

    #winPopup button {
      margin-top: 20px;
      margin-left: 10px;
      padding: 10px 20px;
      font-size: 20px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      color: #000;
    }

    #winPopup #okBtn {
      background: #ff0000;
    }

    #winPopup #okBtn:hover {
      background: #cc0000;
    }

    #winPopup #playAgainBtn {
      background: #00ff00;
    }

    #winPopup #playAgainBtn:hover {
      background: #00cc00;
    }

    .explosion {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #ff0000;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      opacity: 1;
    }

    @media (max-width: 600px) {
      #game {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(6, 1fr);
      }
    }
  </style>
</head>
<body>

  <div id="overlay">
    <h2>Play Music?</h2>
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>

  <div id="game"></div>
  <div id="caption"></div>

  <div id="winPopup">
    <div>Menang bro!</div>
    <button id="okBtn">OK</button>
    <button id="playAgainBtn">Ayo Main Lagi</button>
  </div>

  <audio id="backgroundMusic" loop>
    <source src="gambar/music.mp3" type="audio/mp3">
  </audio>
  <audio id="matchSound">
    <source src="gambar/match.mp3" type="audio/mp3">
  </audio>
  <audio id="noMatchSound">
    <source src="gambar/nomatch.mp3" type="audio/mp3">
  </audio>
  <audio id="winSound">
    <source src="gambar/win.mp3" type="audio/mp3">
  </audio>

  <script>
    const game = document.getElementById('game');
    const overlay = document.getElementById('overlay');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const audio = document.getElementById('backgroundMusic');
    const matchSound = document.getElementById('matchSound');
    const noMatchSound = document.getElementById('noMatchSound');
    const winSound = document.getElementById('winSound');
    const caption = document.getElementById('caption');
    const winPopup = document.getElementById('winPopup');
    const body = document.body;

    // 12 gambar unik awal
    const baseImages = [
      'gambar/1.jpg', 'gambar/2.jpg', 'gambar/3.jpg', 'gambar/4.jpg', 
      'gambar/5.jpg', 'gambar/6.jpg', 'gambar/7.jpg', 'gambar/8.jpg',
      'gambar/9.jpg', 'gambar/10.jpg', 'gambar/11.jpg', 'gambar/12.jpg'
    ];
    
    let gameCards = []; // Menampung total 24 kartu setelah diduplikasi
    let flipped = [];
    let matched = [];

    // Membuat partikel background statis/lambat
    function createDust() {
      const dust = document.createElement('div');
      dust.classList.add('dust');
      const size = Math.random() * 12 + 8;
      dust.style.width = `${size}px`;
      dust.style.height = `${size}px`;
      dust.style.left = `${Math.random() * 100}vw`;
      dust.style.top = `${Math.random() * 100}vh`;
      dust.style.opacity = 1;
      body.appendChild(dust);

      function animateDust() {
        const xMove = (Math.random() - 0.5) * 50;
        const yMove = (Math.random() - 0.5) * 50;
        const duration = Math.random() * 3000 + 2000;
        dust.animate([
          { transform: `translate(${xMove}px, ${yMove}px)` }
        ], {
          duration: duration,
          easing: 'ease-in-out',
          fill: 'forwards'
        }).onfinish = animateDust;
      }
      animateDust();
    }

    // Efek ledakan partikel saat transisi overlay ke game
    function createTransitionDust() {
      for (let i = 0; i < 100; i++) {
        const dust = document.createElement('div');
        dust.classList.add('transition-dust');
        const size = Math.random() * 10 + 5;
        dust.style.width = `${size}px`;
        dust.style.height = `${size}px`;
        dust.style.left = `${Math.random() * 100}vw`;
        dust.style.top = `${Math.random() * 100}vh`;
        dust.style.opacity = 1;
        body.appendChild(dust);

        const xMove = (Math.random() - 0.5) * 100;
        const yMove = (Math.random() - 0.5) * 100;
        dust.animate([
          { transform: 'translate(0, 0)', opacity: 1 },
          { transform: `translate(${xMove}px, ${yMove}px)`, opacity: 0 }
        ], {
          duration: 1000,
          easing: 'ease-out',
          fill: 'forwards'
        }).onfinish = () => dust.remove();
      }
    }

    // Inisialisasi dust background di awal load halaman
    for (let i = 0; i < 150; i++) {
      createDust();
    }

    // Event Listener Pilihan Musik
    yesBtn.addEventListener('click', () => {
      audio.play().catch(err => console.log("Audio play diblokir browser:", err));
      startGame();
    });

    noBtn.addEventListener('click', startGame);

    // Fungsi utama memulai permainan
    function startGame() {
      createTransitionDust();
      setTimeout(() => {
        overlay.style.display = 'none';
        game.style.display = 'grid';
      }, 500);

      // FIX BUG: Gandakan array gambar agar menjadi sepasang (Total 24 Kartu)
      gameCards = [...baseImages, ...baseImages];
      
      // Acak urutan kartu
      gameCards.sort(() => 0.5 - Math.random());

      // Render elemen kartu ke dalam Grid game
      gameCards.forEach((imgUrl, index) => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.value = imgUrl;

        const back = document.createElement('div');
        back.classList.add('back');
        back.textContent = index + 1; // Menampilkan nomor kartu 1 - 24

        const front = document.createElement('div');
        front.classList.add('front');
        
        const img = document.createElement('img');
        img.src = imgUrl;
        img.alt = `Memory card ${index + 1}`;
        img.onerror = () => {
          console.log(`Gambar gagal dimuat: ${imgUrl}`);
          img.src = 'memory_match/placeholder.jpg'; // Pastikan file placeholder ini ada jika gambar utama error
        };
        
        front.appendChild(img);
        card.appendChild(back);
        card.appendChild(front);
        card.addEventListener('click', flipCard);
        game.appendChild(card);
      });
    }

    // Logika membalikkan kartu saat di-klik
    function flipCard() {
      if (flipped.length < 2 && !this.classList.contains('flipped') && !matched.includes(this)) {
        this.classList.add('flipped');
        flipped.push(this);

        if (flipped.length === 2) {
          setTimeout(checkMatch, 1000);
        }
      }
    }

    // Fungsi notifikasi teks di layar
    function showCaption(text, color) {
      caption.textContent = text;
      caption.style.color = color;
      caption.style.display = 'block';
      setTimeout(() => {
        caption.style.display = 'none';
      }, 2000);
    }

    // Efek kembang api ketika menang
    function createExplosion() {
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('explosion');
        particle.style.left = '50vw';
        particle.style.top = '50vh';

        const colors = ['#ff0000', '#ffff00', '#ff6600'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        body.appendChild(particle);

        const angle = Math.random() * 2 * Math.PI;
        const distance = (Math.random() * 200 + 100) * 3;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        particle.animate([
          { transform: 'translate(0, 0)', opacity: 1 },
          { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
        ], {
          duration: 1000,
          easing: 'ease-out',
          fill: 'forwards'
        }).onfinish = () => particle.remove();
      }
    }

    // Efek taburan bintang padat saat menang
    function createWinDust() {
      for (let i = 0; i < 300; i++) {
        const dust = document.createElement('div');
        dust.classList.add('dust');
        const size = Math.random() * 12 + 8;
        dust.style.width = `${size}px`;
        dust.style.height = `${size}px`;
        dust.style.left = `${Math.random() * 100}vw`;
        dust.style.top = `${Math.random() * 100}vh`;
        dust.style.opacity = 1;
        body.appendChild(dust);

        const xMove = (Math.random() - 0.5) * 150;
        const yMove = (Math.random() - 0.5) * 150;
        dust.animate([
          { transform: 'translate(0, 0)', opacity: 1 },
          { transform: `translate(${xMove}px, ${yMove}px)`, opacity: 0 }
        ], {
          duration: 2000,
          easing: 'ease-out',
          fill: 'forwards'
        }).onfinish = () => dust.remove();
      }
    }

    function showWinPopup() {
      audio.pause();
      audio.currentTime = 0;
      winSound.play().catch(err => console.log(err));
      createExplosion();
      createWinDust();
      winPopup.style.display = 'block';
    }

    function closeWinPopup() {
      winSound.pause();
      winSound.currentTime = 0;
      winPopup.style.display = 'none';
    }

    // Mengulang kembali permainan dari awal
    function playAgain() {
      flipped = [];
      matched = [];
      winSound.pause();
      winSound.currentTime = 0;
      winPopup.style.display = 'none';
      game.style.display = 'none';
      game.innerHTML = '';
      
      // Bersihkan sisa partikel animasi lama
      document.querySelectorAll('.dust, .explosion, .transition-dust').forEach(el => el.remove());
      
      overlay.style.display = 'flex';
      for (let i = 0; i < 150; i++) {
        createDust();
      }
    }

    // Validasi kecocokan 2 kartu yang dibuka
    function checkMatch() {
      const card1Number = flipped[0].querySelector('.back').textContent;
      const card2Number = flipped[1].querySelector('.back').textContent;
      
      // Kondisi jebakan khusus pada nomor kartu 21 dan 22
      const isCard21And22 = (card1Number === '21' && card2Number === '22') || (card1Number === '22' && card2Number === '21');

      if (flipped[0].dataset.value === flipped[1].dataset.value) {
        matched.push(flipped[0], flipped[1]);
        matchSound.play().catch(err => console.log(err));
        showCaption('Jawaban Anda Benar!!!', '#00ff00');
        flipped = [];
        
        // Cek jika seluruh kartu (24 buah) berhasil dicocokkan
        if (matched.length === gameCards.length) {
          setTimeout(showWinPopup, 500);
        }
      } else {
        if (isCard21And22) {
          showCaption('Jawaban Anda Salah!!! Game Diulang!', '#ff0000');
          setTimeout(playAgain, 2000);
        } else {
          flipped.forEach(card => card.classList.remove('flipped'));
          noMatchSound.play().catch(err => console.log(err));
          showCaption('Jawaban Anda Salah!!!', '#ff0000');
          flipped = [];
        }
      }
    }

    // Event Listener tombol popup kemenangan
    document.getElementById('okBtn').addEventListener('click', closeWinPopup);
    document.getElementById('playAgainBtn').addEventListener('click', playAgain);
  </script>
</body>
</html>
